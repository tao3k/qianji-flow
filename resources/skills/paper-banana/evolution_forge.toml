[[nodes]]
id = "Logical_Topology_Planning"
task_type = "annotation"
weight = 1.0
params = { execution_mode = "appended" }
[nodes.qianhuan]
# 调用问道中的逻辑架构师
persona_id = "$wendao://skills/research/topology_architect.md"
output_key = "planned_topology"
input_keys = ["retrieved_academic_context"]

[[nodes]]
id = "Aesthetic_Refinement"
task_type = "annotation"
weight = 1.0
params = { execution_mode = "appended" }
[nodes.qianhuan]
# 调用问道中的 NeurIPS 美学风格指南
persona_id = "$wendao://skills/aesthetics/neurips_stylist.md"
output_key = "stylized_manifest"
input_keys = ["planned_topology"]

[[nodes]]
id = "High_Rigor_Double_Blind_Audit"
task_type = "formal_audit"
weight = 1.0
params = { 
    threshold_score = 0.98, 
    max_retries = 10,
    output_key = "audit_verdict", 
    score_key = "aesthetic_purity_score" 
}
[nodes.qianhuan]
# 调用问道中的形式化审计规范
persona_id = "$wendao://skills/governance/formal_reviewer.md"
output_key = "audit_trace"
input_keys = ["stylized_manifest", "retrieved_academic_context"]

[[nodes]]
id = "Final_Sovereign_Release"
